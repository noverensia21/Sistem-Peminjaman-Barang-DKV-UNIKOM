<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Peminjaman Barang</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f7fb; }
        
        /* Ubah warna ke Abu Muda dan Tengah */
        .hero {
            background: linear-gradient(135deg, #e0e0e0, #f8f9fa); /* Gradasi Abu Muda */
            color: #333; /* Teks jadi gelap agar kontras dengan abu */
            padding: 40px; 
            border-radius: 20px; 
            margin-top: 20px;
            text-align: center; /* Teks ke tengah */
        }
        
        /* Penyesuaian logo dan tombol */
        .logo-instansi { max-height: 100px; margin-bottom: 20px; }
        
        .stat-card { border: none; border-radius: 15px; }
        .card-barang { transition: 0.3s; border: none; border-radius: 15px; }
        .card-barang:hover { transform: translateY(-5px); }
        .zoomable-image { cursor: pointer; transition: 0.2s; }
        .card-barang img.card-img-top { height: 220px; object-fit: cover; }
        .badge-pinjam { background: #dc3545; color: white; }
        .badge-kembali { background: #198754; color: white; }
        .footer { text-align: center; margin-top: 40px; color: #666; padding-bottom: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="hero shadow">
        <img src="logo.png" alt="Logo" class="logo-instansi" onerror="this.style.display='none'">
        
        <h1 class="fw-bold">📦 Sistem Peminjaman Barang</h1>
        <p>Monitoring barang yang sedang dipinjam dan yang sudah dikembalikan.</p>
        <div class="mt-4">
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSdWVkBjDQyUnuZsWcCkPrHbrY3XwQiHQaXQjMHzoN03S_UQUQ/viewform?usp=header" target="_blank" class="btn btn-success btn-lg me-2 mb-2">
                Peminjaman Barang
            </a>
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSfVjQBc-9G7v04T-cLxNGnRKU93fMZnW38T9FP_u_RNmvyoyg/viewform?usp=publish-editor" target="_blank" class="btn btn-danger btn-lg mb-2">
                Pengembalian Barang
            </a>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-md-4 mb-3">
            <div class="card stat-card shadow">
                <div class="card-body text-center"><h2 id="totalData">0</h2>Total Data</div>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card stat-card shadow">
                <div class="card-body text-center"><h2 id="totalPinjam">0</h2>Masih Dipinjam</div>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card stat-card shadow">
                <div class="card-body text-center"><h2 id="totalKembali">0</h2>Sudah Dikembalikan</div>
            </div>
        </div>
    </div>

    <div class="row mb-3">
        <div class="col-md-6 mb-2">
            <input type="text" id="searchInput" class="form-control" placeholder="Cari barang atau peminjam...">
        </div>
        <div class="col-md-6 mb-2">
            <select id="statusFilter" class="form-select">
                <option value="">Semua Status</option>
                <option value="Dipinjam">Dipinjam</option>
                <option value="Dikembalikan">Dikembalikan</option>
            </select>
        </div>
    </div>

    <div class="row" id="barangContainer">
        <div class="col-12">
            <div class="alert alert-info">Menunggu data dari Google Sheet...</div>
        </div>
    </div>

    <div class="footer">Sistem Inventaris Barang &copy; 2026</div>
</div>

<div class="modal fade" id="imageModal" tabindex="-1" aria-labelledby="imageModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 bg-transparent">
            <div class="modal-header border-0 bg-dark text-white rounded-top">
                <h5 class="modal-title" id="imageModalLabel">Preview Gambar</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-0 text-center bg-dark rounded-bottom pb-2">
                <img id="modalImage" src="" class="img-fluid rounded" alt="Zoomed Image" style="max-height: 85vh; width: auto;">
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbybQYAk5dre4VeoHcYJUuGXU-addsTvNEyxhOVgfIAPHYR1NZr44nZYEhUODbVOM-Evqg/exec";
    let semuaData = [];
    let imageModalInstance = null;

    function zoomImage(url, title) {
        document.getElementById("modalImage").src = url;
        document.getElementById("imageModalLabel").innerText = title || "Preview Gambar";
        
        if (!imageModalInstance) {
            imageModalInstance = new bootstrap.Modal(document.getElementById('imageModal'));
        }
        imageModalInstance.show();
    }

    async function loadData() {
        try {
            const response = await fetch(API_URL);
            const result = await response.json();
            if (result.success) semuaData = result.data || [];
            updateDashboard();
            renderData(semuaData);
        } catch (error) {
            document.getElementById("barangContainer").innerHTML = `<div class="alert alert-danger">Gagal memuat data: ${error.message}</div>`;
        }
    }

    function updateDashboard() {
        document.getElementById("totalData").innerText = semuaData.length;
        const pinjam = semuaData.filter(item => item.status && item.status.toLowerCase() === "dipinjam").length;
        const kembali = semuaData.filter(item => item.status && item.status.toLowerCase() === "dikembalikan").length;
        document.getElementById("totalPinjam").innerText = pinjam;
        document.getElementById("totalKembali").innerText = kembali;
    }

    function renderData(data) {
        const container = document.getElementById("barangContainer");
        if (!data.length) {
            container.innerHTML = `<div class="col-12"><div class="alert alert-warning">Tidak ada data.</div></div>`;
            return;
        }

        container.innerHTML = "";

        data.forEach(item => {
            let tanggalRapi = item.timestamp;
            if (item.timestamp) {
                const dateObj = new Date(item.timestamp);
                if (!isNaN(dateObj)) {
                    tanggalRapi = dateObj.toLocaleDateString('id-ID', {
                        day: '2-digit', month: 'short', year: 'numeric',
                        hour: '2-digit', minute: '2-digit'
                    }) + ' WIB';
                }
            }

            const statusItem = item.status ? item.status.toLowerCase() : "dipinjam";
            let statusBadge = '';
            let detailPerbandingan = '';

            const noImageFallback = "https://dummyimage.com/300x220/cccccc/ffffff.jpg&text=Tidak+Ada+Foto";
            const errorImageFallback = "https://dummyimage.com/300x220/ffcccc/cc0000.jpg&text=Gagal+Muat+Foto";

            if (statusItem === 'dikembalikan') {
                statusBadge = `<span class="badge badge-kembali mb-2 px-3 py-2">✅ Dikembalikan</span>`;
                
                let tglKembaliRapi = item.waktu_kembali;
                if (item.waktu_kembali && !String(item.waktu_kembali).includes("Manual")) {
                    const dObj = new Date(item.waktu_kembali);
                    if (!isNaN(dObj)) {
                        tglKembaliRapi = dObj.toLocaleDateString('id-ID', {
                            day: '2-digit', month: 'short', year: 'numeric',
                            hour: '2-digit', minute: '2-digit'
                        }) + ' WIB';
                    }
                }

                let alertSinkron = '';
                if (item.status_sinkron === 'Tidak Sesuai') {
                    alertSinkron = `<div class="col-12 mt-2"><div class="alert alert-warning py-2 px-3 mb-0" style="font-size: 0.8rem;"><b>⚠️ TIDAK SINKRON:</b><br> Daftar barang yang dikembalikan tidak sama dengan yang dipinjam.</div></div>`;
                } else if (item.status_sinkron === 'Sesuai') {
                     alertSinkron = `<div class="col-12 mt-2"><div class="alert alert-success py-1 px-3 mb-0 text-center" style="font-size: 0.8rem;">Daftar Barang Sesuai</div></div>`;
                }

                let fotoKembaliHtml = '';
                if (item.foto_kembali && item.foto_kembali !== "") {
                    fotoKembaliHtml = `
                        <div class="mt-2 text-center">
                            <p class="mb-1 text-success" style="font-size: 0.75rem;"><b>BUKTI FOTO KEMBALI:</b></p>
                            <img src="${item.foto_kembali}" 
                                 class="img-fluid rounded border border-success zoomable-image" 
                                 style="max-height: 180px; width: 100%; object-fit: cover;" 
                                 onerror="this.style.display='none'" 
                                 alt="Foto Pengembalian"
                                 onclick="zoomImage('${item.foto_kembali}', 'Bukti Pengembalian: ${item.nama_pengembali}')">
                        </div>
                    `;
                }

                detailPerbandingan = `
                <div class="row mt-3 p-2 bg-light rounded border mx-0">
                    <div class="col-6 border-end px-2">
                        <p class="mb-1 text-primary" style="font-size: 0.75rem;"><b>INPUT PINJAM</b></p>
                        <p class="mb-2 lh-sm"><small><b>Oleh:</b><br>${item.nama_dosen}</small></p>
                        <p class="mb-2 lh-sm"><small><b>Tgl Pinjam:</b><br>${tanggalRapi}</small></p>
                        <p class="mb-0 lh-sm text-primary"><small><b>Barang Pinjam:</b><br>${item.barang}</small></p>
                    </div>
                    <div class="col-6 px-2">
                        <p class="mb-1 text-success" style="font-size: 0.75rem;"><b>INPUT KEMBALI</b></p>
                        <p class="mb-2 lh-sm"><small><b>Oleh:</b><br>${item.nama_pengembali}</small></p>
                        <p class="mb-2 lh-sm"><small><b>Tgl Kembali:</b><br>${tglKembaliRapi}</small></p>
                        <p class="mb-0 lh-sm text-success"><small><b>Barang Kembali:</b><br>${item.barang_kembali || '-'}</small></p>
                    </div>
                    ${alertSinkron}
                    <div class="col-12 border-top mt-3 pt-2 px-2">
                        <p class="text-danger mb-0 lh-sm"><small><b>Kondisi Barang:</b> ${item.kondisi || '-'}</small></p>
                        ${fotoKembaliHtml}
                    </div>
                </div>
                `;
            } else {
                statusBadge = `<span class="badge badge-pinjam mb-2 px-3 py-2">⏳ Dipinjam</span>`;
                detailPerbandingan = `
                <div class="mt-3">
                    <p class="mb-1 lh-sm"><small><b>Peminjam :</b><br>${item.nama_dosen || '-'}</small></p>
                    <p class="mb-1 lh-sm"><small><b>Tgl Pinjam :</b><br>${tanggalRapi}</small></p>
                </div>
                `;
            }

            container.innerHTML += `
            <div class="col-md-4 mb-4">
                <div class="card card-barang shadow h-100">
                    <img src="${item.foto_preview || noImageFallback}" 
                         class="card-img-top zoomable-image" 
                         alt="${item.barang || 'Barang'}" 
                         onerror="this.onerror=null; this.src='${errorImageFallback}'"
                         onclick="zoomImage('${item.foto_preview || noImageFallback}', 'Foto Pinjam: ${item.barang || 'Barang'}')">
                    <div class="card-body pb-2">
                        ${statusBadge}
                        <h6 class="card-title fw-bold mt-2 lh-base">${item.barang || '-'}</h6>
                        <p class="mb-1 mt-2 lh-sm"><small><b>Keterangan (Acara) :</b><br>${item.keterangan || '-'}</small></p>
                        ${detailPerbandingan}
                    </div>
                </div>
            </div>
            `;
        }); 
    }

    function filterData() {
        const keyword = document.getElementById("searchInput").value.toLowerCase();
        const statusVal = document.getElementById("statusFilter").value.toLowerCase(); 
        
        const hasil = semuaData.filter(item => {
            const barang = (item.barang || "").toLowerCase();
            const dosen = (item.nama_dosen || "").toLowerCase();
            const dosenKembali = (item.nama_pengembali || "").toLowerCase();
            const statusItem = (item.status || "").toLowerCase();
            
            const matchKeyword = barang.includes(keyword) || dosen.includes(keyword) || dosenKembali.includes(keyword);
            const matchStatus = statusVal === "" || statusItem === statusVal;

            return matchKeyword && matchStatus;
        });
        renderData(hasil);
    }

    document.getElementById("searchInput").addEventListener("keyup", filterData);
    document.getElementById("statusFilter").addEventListener("change", filterData);
    loadData();
</script>
</body>
</html>
