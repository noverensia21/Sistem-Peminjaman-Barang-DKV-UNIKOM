<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Peminjaman Barang</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f7fb; }
        
        .hero { 
            background: linear-gradient(135deg, #e0e0e0, #f8f9fa); 
            color: #333; 
            padding: 40px; 
            border-radius: 20px; 
            margin-top: 20px; 
            text-align: center; 
        }
        
        .logo-instansi { max-height: 100px; margin-bottom: 20px; }
        .stat-card { border: none; border-radius: 15px; }
        .card-barang { transition: 0.3s; border: none; border-radius: 15px; }
        .card-barang:hover { transform: translateY(-5px); }
        .zoomable-image { cursor: pointer; transition: 0.2s; }
        .card-barang img.card-img-top { height: 220px; object-fit: cover; }
        .badge-pinjam { background: #dc3545; color: white; }
        .badge-kembali { background: #198754; color: white; }
        .footer { text-align: center; margin-top: 40px; color: #666; padding-bottom: 20px; }

        /* =========================================
           KODE RESPONSIF UNTUK HP DAN TABLET 
           ========================================= */
        @media (max-width: 768px) {
            .hero { padding: 25px 15px; margin-top: 10px; }
            .hero h1 { font-size: 1.6rem; }
            .hero p { font-size: 0.9rem; }
            .logo-instansi { max-height: 70px; margin-bottom: 15px; }
            .stat-card h2 { font-size: 1.8rem; }
        }
        
        @media (max-width: 575px) {
            /* Garis pembatas perbandingan berubah jadi di bawah pada HP */
            .border-responsive { 
                border-right: none !important; 
                border-bottom: 1px solid #dee2e6; 
                padding-bottom: 10px; 
                margin-bottom: 10px; 
            }
        }
        @media (min-width: 576px) {
            /* Garis pembatas perbandingan tetap di kanan pada Tablet/Laptop */
            .border-responsive { border-right: 1px solid #dee2e6; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero shadow">
        <img src="logo.png" alt="Logo" class="logo-instansi img-fluid" onerror="this.style.display='none'">
        <h1 class="fw-bold mb-2">📦 Sistem Peminjaman Barang</h1>
        <p class="text-muted mb-4">Monitoring barang yang sedang dipinjam dan yang sudah dikembalikan.</p>
        
        <div class="d-grid gap-2 d-sm-flex justify-content-sm-center mt-2">
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSdWVkBjDQyUnuZsWcCkPrHbrY3XwQiHQaXQjMHzoN03S_UQUQ/viewform?usp=header" target="_blank" class="btn btn-success btn-lg px-4 gap-3">Peminjaman Barang</a>
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSfVjQBc-9G7v04T-cLxNGnRKU93fMZnW38T9FP_u_RNmvyoyg/viewform?usp=publish-editor" target="_blank" class="btn btn-danger btn-lg px-4">Pengembalian Barang</a>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-md-4 mb-3">
            <div class="card stat-card shadow">
                <div class="card-body text-center"><h2 id="totalData">0</h2>Total Peminjaman</div>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card stat-card shadow">
                <div class="card-body text-center"><h2 id="totalPinjam">0</h2>Masih Dipinjam</div>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card stat-card shadow">
                <div class="card-body text-center"><h2 id="totalKembali">0</h2>Sudah Dikembalikan</div>
            </div>
        </div>
    </div>

    <div class="row mb-3">
        <div class="col-md-6 mb-2">
            <input type="text" id="searchInput" class="form-control" placeholder="Cari barang, peminjam, atau ID Peminjaman...">
        </div>
        <div class="col-md-6 mb-2">
            <select id="statusFilter" class="form-select">
                <option value="">Semua Status</option>
                <option value="Dipinjam">Dipinjam</option>
                <option value="Dikembalikan">Dikembalikan</option>
            </select>
        </div>
    </div>

    <div class="row" id="barangContainer">
        <div class="col-12"><div class="alert alert-info">Menunggu data dari Google Sheet...</div></div>
    </div>

    <div class="footer">FAKULTAS DESAIN UNIKOM &copy; 2026</div>
</div>

<div class="modal fade" id="imageModal" tabindex="-1" aria-labelledby="imageModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold" id="imageModalLabel">Preview Gambar</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body text-center bg-dark rounded-bottom">
                <img src="" id="modalImage" class="img-fluid rounded shadow" style="max-height: 75vh; object-fit: contain;">
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbybQYAk5dre4VeoHcYJUuGXU-addsTvNEyxhOVgfIAPHYR1NZr44nZYEhUODbVOM-Evqg/exec";
    let semuaData = [];
    let imageModalInstance = null;

    function zoomImage(url, title) {
        document.getElementById("modalImage").src = url;
        document.getElementById("imageModalLabel").innerText = title || "Preview Gambar";
        if (!imageModalInstance) imageModalInstance = new bootstrap.Modal(document.getElementById('imageModal'));
        imageModalInstance.show();
    }

    async function loadData() {
        try {
            const response = await fetch(API_URL);
            const result = await response.json();
            if (result.success) semuaData = result.data || [];
            updateDashboard();
            renderData(semuaData);
        } catch (error) {
            document.getElementById("barangContainer").innerHTML = `<div class="alert alert-danger">Gagal memuat data: ${error.message}</div>`;
        }
    }

    function updateDashboard() {
        document.getElementById("totalData").innerText = semuaData.length;
        const pinjam = semuaData.filter(item => item.status && item.status.toLowerCase() === "dipinjam").length;
        const kembali = semuaData.filter(item => item.status && item.status.toLowerCase() === "dikembalikan").length;
        document.getElementById("totalPinjam").innerText = pinjam;
        document.getElementById("totalKembali").innerText = kembali;
    }

    // Fungsi warna dinamis untuk kondisi barang
    function getKondisiColor(teks) {
        if (!teks || teks === '-') return 'text-secondary';
        const t = teks.toUpperCase();
        
        if (t.includes('KURANG') || t.includes('RUSAK') || t.includes('ERROR')) return 'text-danger'; 
        if (t.includes('BAIK') || t.includes('AMAN')) return 'text-success';
        
        return 'text-warning';
    }

    function renderData(data) {
        const container = document.getElementById("barangContainer");
        if (!data.length) {
            container.innerHTML = `<div class="col-12"><div class="alert alert-warning">Tidak ada data.</div></div>`;
            return;
        }

        container.innerHTML = "";

        data.forEach(item => {
            let tanggalRapi = item.timestamp;
            if (item.timestamp) {
                const dateObj = new Date(item.timestamp);
                if (!isNaN(dateObj)) tanggalRapi = dateObj.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }) + ' WIB';
            }

            const statusItem = item.status ? item.status.toLowerCase() : "dipinjam";
            const noImageFallback = "https://dummyimage.com/300x220/cccccc/ffffff.jpg&text=Tidak+Ada+Foto";
            const errorImageFallback = "https://dummyimage.com/300x220/ffcccc/cc0000.jpg&text=Gagal+Muat";
            
            const fotoPinjamArray = item.foto_preview || [];
            const coverImage = fotoPinjamArray.length > 0 ? fotoPinjamArray[0] : noImageFallback;
            
            let extraPinjamHtml = '';
            if (fotoPinjamArray.length > 1) {
                extraPinjamHtml = `<div class="d-flex overflow-auto mt-2 gap-2 pb-1" style="scrollbar-width: thin;">`;
                for(let i = 1; i < fotoPinjamArray.length; i++) {
                    extraPinjamHtml += `<img src="${fotoPinjamArray[i]}" class="zoomable-image rounded border border-secondary" style="height: 50px; min-width: 50px; object-fit: cover;" onclick="zoomImage('${fotoPinjamArray[i]}', 'Foto Tambahan Peminjaman')">`;
                }
                extraPinjamHtml += `</div>`;
            }

            let emailPinjamHtml = (item.email_pinjam && item.email_pinjam !== "-") ? `<br><span class="text-muted" style="font-size: 0.7rem;">${item.email_pinjam}</span>` : "";
            let emailKembaliHtml = (item.email_kembali && item.email_kembali !== "-") ? `<br><span class="text-muted" style="font-size: 0.7rem;">${item.email_kembali}</span>` : "";
            
            let idOtomatisHtml = `<span class="badge bg-secondary mb-2 px-2 py-2 ms-1">${item.id_peminjaman || '-'}</span>`;

            let kondisiPinjam = item.kondisi_pinjam || '-';
            let kondisiKembali = item.kondisi_kembali || '-';
            let colorPinjam = getKondisiColor(kondisiPinjam);
            let colorKembali = getKondisiColor(kondisiKembali);

            let statusBadge = '';
            let detailPerbandingan = '';

            if (statusItem === 'dikembalikan') {
                statusBadge = `<span class="badge badge-kembali mb-2 px-3 py-2">✅ Dikembalikan</span>`;
                
                let tglKembaliRapi = item.waktu_kembali;
                if (item.waktu_kembali && !String(item.waktu_kembali).includes("Manual")) {
                    const dObj = new Date(item.waktu_kembali);
                    if (!isNaN(dObj)) tglKembaliRapi = dObj.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }) + ' WIB';
                }

                let alertSinkron = '';
                if (item.status_sinkron === 'Tidak Sesuai') {
                    alertSinkron = `<div class="col-12 mt-2"><div class="alert alert-warning py-2 px-3 mb-0" style="font-size: 0.8rem;"><b>⚠️ TIDAK SINKRON:</b><br> Item yang dikembalikan berbeda dengan saat dipinjam.</div></div>`;
                }

                let fotoKembaliHtml = '';
                const fotoKembaliArray = item.foto_kembali || [];
                if (fotoKembaliArray.length > 0) {
                    fotoKembaliHtml = `<div class="mt-2 text-center"><p class="mb-1 text-success" style="font-size: 0.75rem;"><b>BUKTI FOTO KEMBALI:</b></p><div class="d-flex flex-wrap justify-content-center gap-2">`;
                    fotoKembaliArray.forEach((f, idx) => {
                        let widthStyle = fotoKembaliArray.length === 1 ? '100%' : '45%';
                        fotoKembaliHtml += `<img src="${f}" class="img-fluid rounded border border-success zoomable-image" style="height: 120px; width: ${widthStyle}; object-fit: cover;" onerror="this.onerror=null; this.src='${errorImageFallback}'" onclick="zoomImage('${f}', 'Bukti Pengembalian')">`;
                    });
                    fotoKembaliHtml += `</div></div>`;
                }

                // Penggunaan grid col-12 col-sm-6 agar responsif (susun ke bawah di HP)
                detailPerbandingan = `
                <div class="row mt-3 p-2 bg-light rounded border mx-0">
                    <div class="col-12 col-sm-6 border-responsive px-2">
                        <p class="mb-1 text-primary" style="font-size: 0.75rem;"><b>INPUT PINJAM</b></p>
                        <p class="mb-2 lh-sm"><small><b>Oleh:</b><br>${item.nama_dosen}${emailPinjamHtml}</small></p>
                        <p class="mb-2 lh-sm"><small><b>Waktu:</b><br>${tanggalRapi}</small></p>
                        <p class="mb-2 lh-sm text-primary"><small><b>Barang:</b><br>${item.barang}</small></p>
                        <p class="mb-0 lh-sm"><small><b>Kondisi Barang:</b><br><span class="${colorPinjam} fw-bold">${kondisiPinjam}</span></small></p>
                    </div>
                    <div class="col-12 col-sm-6 px-2">
                        <p class="mb-1 text-success" style="font-size: 0.75rem;"><b>INPUT KEMBALI</b></p>
                        <p class="mb-2 lh-sm"><small><b>Oleh:</b><br>${item.nama_pengembali}${emailKembaliHtml}</small></p>
                        <p class="mb-2 lh-sm"><small><b>Waktu:</b><br>${tglKembaliRapi}</small></p>
                        <p class="mb-2 lh-sm text-success"><small><b>Barang:</b><br>${item.barang_kembali || '-'}</small></p>
                        <p class="mb-0 lh-sm"><small><b>Kondisi Barang:</b><br><span class="${colorKembali} fw-bold">${kondisiKembali}</span></small></p>
                    </div>
                    ${alertSinkron}
                    ${fotoKembaliHtml ? `<div class="col-12 border-top mt-3 pt-2 px-2">${fotoKembaliHtml}</div>` : ''}
                </div>
                `;
            } else {
                statusBadge = `<span class="badge badge-pinjam mb-2 px-3 py-2">⏳ Dipinjam</span>`;
                detailPerbandingan = `
                <div class="mt-3 bg-light p-2 rounded border">
                    <p class="mb-1 lh-sm"><small><b>Peminjam :</b><br>${item.nama_dosen || '-'}${emailPinjamHtml}</small></p>
                    <p class="mb-1 lh-sm"><small><b>Tgl Pinjam :</b><br>${tanggalRapi}</small></p>
                    <p class="mb-0 lh-sm mt-2 pt-2 border-top"><small><b>Kondisi Barang :</b> <span class="${colorPinjam} fw-bold">${kondisiPinjam}</span></small></p>
                </div>
                `;
            }

            container.innerHTML += `
            <div class="col-md-4 mb-4">
                <div class="card card-barang shadow h-100">
                    <img src="${coverImage}" class="card-img-top zoomable-image" alt="Foto Barang" onerror="this.onerror=null; this.src='${errorImageFallback}'" onclick="zoomImage('${coverImage}', 'Foto Peminjaman')">
                    <div class="card-body pb-2">
                        ${extraPinjamHtml}
                        <div class="mt-2">${statusBadge} ${idOtomatisHtml}</div>
                        <h6 class="card-title fw-bold mt-2 lh-base">${item.barang || '-'}</h6>
                        <p class="mb-1 mt-2 lh-sm"><small><b>Keterangan (Acara) :</b><br>${item.keterangan || '-'}</small></p>
                        ${detailPerbandingan}
                    </div>
                </div>
            </div>
            `;
        }); 
    }

    function filterData() {
        const keyword = document.getElementById("searchInput").value.toLowerCase();
        const statusVal = document.getElementById("statusFilter").value.toLowerCase(); 
        
        const hasil = semuaData.filter(item => {
            const barang = (item.barang || "").toLowerCase();
            const dosen = (item.nama_dosen || "").toLowerCase();
            const statusItem = (item.status || "").toLowerCase();
            const idP = (item.id_peminjaman || "").toLowerCase();
            
            const matchKeyword = barang.includes(keyword) || dosen.includes(keyword) || idP.includes(keyword);
            const matchStatus = statusVal === "" || statusItem === statusVal;

            return matchKeyword && matchStatus;
        });
        renderData(hasil);
    }

    document.getElementById("searchInput").addEventListener("keyup", filterData);
    document.getElementById("statusFilter").addEventListener("change", filterData);
    loadData();
</script>
</body>
</html>
